services:
  - type: web
    name: dermatip-api
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn --chdir backend config.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: FRONTEND_ORIGINS
        value: https://derma-tip-app.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: dermatip-db
          property: connectionString

databases:
  - name: dermatip-db
    plan: free
